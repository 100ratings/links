<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="manifest" href="/manifest.json">
  <title>503 Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { overflow-x: hidden !important; box-sizing: border-box; width: 100vw; max-width: 100vw; }
    *, *:before, *:after { box-sizing: inherit; }
    html { overflow-y: auto; height: 100%; }
    body {
      margin: 0; background: #fff; font-family: 'Source Sans Pro', sans-serif;
      color: #333; min-height: 100vh;
    }
    #content { display: block; padding: 30px 10px; width: 100vw; box-sizing: border-box; }
    #content .inner { max-width: 600px; margin: 0 auto; }
    #blocks { display: flex; flex-direction: column; gap: 10px; }
    .selectblock {
      background: #fff; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 15px; cursor: pointer; font-size: 1.1em;
      transition: background .2s ease, transform .1s ease;
      text-align: center;
    }
    .selectblock:hover { background: #f0f0f0; }
    .selectblock:active { transform: translateX(2px); }
  </style>
</head>
<body>

<div id="content">
  <div class="inner">
    <div id="blocks">
      <!-- ✅ SHORTCUTS -->
      <div class="selectblock" onclick="cleanRedirect('https://www.icloud.com/shortcuts/420e579e402c4740a8fba89cd87e25ae')">Noteify</div>
      <div class="selectblock" onclick="cleanRedirect('https://www.icloud.com/shortcuts/616f03684d2b489c9ce045d1fb83c992')">Real Inject</div>

      <!-- ✅ APPCLIPS COM MENU -->
      <div class="selectblock" onclick="openMenu('https://appclip.apple.com/id?p=com.benjaminvianney.rdigit.spectator')">R-Digit</div>
      <div class="selectblock" onclick="openMenu('https://t11.to/n?code=567768&bt=off')">Notarized</div>
      <div class="selectblock" onclick="openMenu('https://ccn.im/?pin=kyi')">Syncro</div>
      <div class="selectblock" onclick="openMenu('https://appclip.apple.com/id?p=com.benjaminvianney.form.spectator')">Overlayed</div>
      <div class="selectblock" onclick="openMenu('https://appclip.apple.com/id?p=com.magicproideas.magictrick.magiccalculator.pulsepro.Clip&userId=1PFg9eGVRATqHEZXzkdXovGvupg2')">Pulse</div>
      <div class="selectblock" onclick="openMenu('https://cronometro.vercel.app')">Angel Number</div>
    </div>
  </div>
</div>

<script>
// Função para redirecionamento limpo (Noteify, Real Inject)
function cleanRedirect(url) {
  const webapp = window.open(url, '_blank');
  setTimeout(() => {
    try {
      webapp.location.replace('https://google.com');
      setTimeout(() => webapp.close(), 1000);
    } catch(e) {
      // Fallback caso o bloqueador de popups interfira
      location.replace('https://google.com');
    }
  }, 10000);
}

// Função para abrir o menu de opções
function openMenu(appURL){
  const box = document.createElement('div');
  box.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.2);font-size:18px;font-family:sans-serif;z-index:99999;text-align:center;";

  const b1 = document.createElement('div');
  b1.innerText = 'Arca de Noé';
  b1.style.cssText = "margin:10px;padding:12px;border-radius:8px;background:#f2f2f2;cursor:pointer;font-weight:bold;";

  const b2 = document.createElement('div');
  b2.innerText = 'Inject';
  b2.style.cssText = "margin:10px;padding:12px;border-radius:8px;background:#dcdcdc;cursor:pointer;font-weight:bold;";

  b1.onclick = () => {
    document.body.removeChild(box);
    const w = window.open(appURL, '_blank');
    setTimeout(() => {
      try {
        w.location.replace('https://google.com');
        setTimeout(() => w.close(), 1000);
        location.replace('https://google.com/search?tbm=isch&q=arca+de+noé');
      } catch(e) {
        location.replace('https://google.com/search?tbm=isch&q=arca+de+noé');
      }
    }, 10000);
  };

  b2.onclick = () => {
    document.body.removeChild(box);
    const w = window.open(appURL, '_blank');
    setTimeout(() => {
      try {
        w.location.replace('https://google.com');
        setTimeout(() => w.close(), 1000);
        location.replace('https://gooqlc.com/dmax');
      } catch(e) {
        location.replace('https://gooqlc.com/dmax');
      }
    }, 10000);
  };

  box.appendChild(b1);
  box.appendChild(b2);
  document.body.appendChild(box);
}
</script>

</body>
</html>
