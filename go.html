<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1">
  <title>Redirecionando...</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    // Initialize Firebase (from firebase-config.js)
    // const app = firebase.initializeApp(firebaseConfig);
    // const db = firebase.firestore();

    document.addEventListener('DOMContentLoaded', () => {
      const currentUrlRef = db.collection('nfc').doc('currentUrl');
      currentUrlRef.get().then((doc) => {
        if (doc.exists) {
          const data = doc.data();
          if (data && data.url) {
            window.location.replace(data.url);
          } else {
            window.location.replace('/'); // Redireciona para a página principal se não houver URL
          }
        } else {
          window.location.replace('/'); // Redireciona para a página principal se o documento não existir
        }
      }).catch((error) => {
        console.error("Erro ao buscar URL do NFC: ", error);
        window.location.replace('/'); // Em caso de erro, redireciona para a página principal
      });
    });
  </script>
</head>
<body>
  <p>Redirecionando você...</p>
</body>
</html>
