<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1">
  <title>Redirecionando...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    p {
      color: #333;
      font-size: 18px;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirecionando você...</p>
  </div>

  <script>
    // Aguardar o Firebase inicializar
    function redirectToNFCUrl() {
      if (typeof db === "undefined") {
        console.error("Firebase não inicializou");
        setTimeout(redirectToNFCUrl, 500);
        return;
      }

      const currentUrlRef = db.collection("nfc").doc("currentUrl");
      currentUrlRef.get().then((doc) => {
        if (doc.exists) {
          const data = doc.data();
          if (data && data.url) {
            console.log("Redirecionando para: " + data.url);
            
            // Redireciona para o URL armazenado no Firebase
            window.location.replace(data.url);
            
            // Aguarda 10 segundos (tempo para o AppClip carregar) e depois muda para Google
            setTimeout(() => {
              console.log("Mudando para Google para limpar histórico");
              window.location.replace("https://www.google.com");
            }, 10000);
          } else {
            console.error("URL não encontrada no documento");
            window.location.replace("https://www.google.com");
          }
        } else {
          console.error("Documento não existe");
          window.location.replace("https://www.google.com");
        }
      }).catch((error) => {
        console.error("Erro ao buscar URL do NFC: ", error);
        window.location.replace("https://www.google.com");
      });
    }

    // Iniciar redirecionamento após um pequeno delay para garantir que o Firebase carregou
    setTimeout(redirectToNFCUrl, 1000);
  </script>
</body>
</html>
